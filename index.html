<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="inc-dec-box">
            <div class="decrement-box">
            <input type="button" id="decrement-btn" value="-">
        </div>
        <div class="number-box">
            <h2 id="h">0</h2>
        </div>
        <div class="increment-box">
            <input type="button" id="increment-btn" value="+">
        </div>
        
        </div>

        <div class="restart-btn">
            <input type="button" name="restart-btn" id="restart-btn" value="Restart">
        </div>
        
        

    </div>
    <script src="script.js"></script>
</body>
</html>
